name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Typecheck, tests, migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gmb
          POSTGRES_PASSWORD: gmb
          POSTGRES_DB: gmb_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Prisma reads DATABASE_URL even for `validate` and `generate`, so it must
      # be present in every step, not just the ones that touch the database.
      DATABASE_URL: postgresql://gmb:gmb@localhost:5432/gmb_ci
      JWT_SECRET: ci_secret_not_used_for_anything_real_0123456789

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Typecheck web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

      - name: Tests
        run: npx vitest run

      # Proves the migrations can build the schema from nothing — a schema that
      # only exists via `db push` would pass every other step and still be
      # undeployable.
      - name: Migrations apply to an empty database
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - name: Schema matches migrations
        run: |
          npx prisma migrate diff \
            --from-migrations packages/db/prisma/migrations \
            --to-schema-datamodel packages/db/prisma/schema.prisma \
            --shadow-database-url "$DATABASE_URL" \
            --exit-code \
          || (echo "::error::schema.prisma has drifted from migrations — run 'npm run db:migrate'" && exit 1)

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
